<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cebuano Demo Redirect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="redirect-body">
  <main class="redirect-shell">
    <section class="redirect-card">
      <span class="badge">Smart redirect</span>
      <h1 id="projectName">Opening demo…</h1>
      <p id="redirectMessage" class="lead">Please wait while we send you to the live Cebuano speech-to-text demo.</p>

      <div class="info-grid">
        <div class="info-block">
          <span class="label">Stable QR URL</span>
          <code id="stableUrl">Loading…</code>
        </div>
        <div class="info-block">
          <span class="label">Current destination</span>
          <code id="destinationUrl">Loading…</code>
        </div>
      </div>

      <div class="actions">
        <a id="openNowBtn" class="primary-btn" href="#">Open now</a>
        <a class="secondary-btn" href="./display.html">Open display screen</a>
      </div>

      <p class="tiny" id="countdownText">Redirecting…</p>
    </section>
  </main>

  <script src="./settings.js"></script>
  <script src="./scripts/app.js"></script>
</body>
</html>
